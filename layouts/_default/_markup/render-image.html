{{ $src := .Destination }}
{{ $alt := .Text }}
{{ $res := .Page.Resources.GetMatch (path.Base $src) }}
{{ if $res }}
  {{ $oriented := $res.Filter (images.AutoOrient) }}
  {{ $resized := $oriented.Fit "1200x1200 webp q85" }}
  <img src="{{ $resized.RelPermalink }}" alt="{{ $alt }}" loading="lazy" width="{{ $resized.Width }}" height="{{ $resized.Height }}">
{{ else }}
  <img src="{{ $src }}" alt="{{ $alt }}" loading="lazy">
{{ end }}
