<style>
    .craft-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 16px;
    }
    .craft-grid a img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }
  </style>
  
  <div class="craft-grid">
    {{ range .Page.Pages }}
      {{ $images := .Resources.Match "img/*" }}
      {{ $image := index $images 0 }}
      {{ if $image }}
        {{ $oriented := $image.Filter (images.AutoOrient) }}
        {{ $thumb := $oriented.Fill "400x400 webp q85" }}
        <a href="{{ .Permalink }}">
          <img src="{{ $thumb.RelPermalink }}" alt="{{ .Title }}" loading="lazy" width="{{ $thumb.Width }}" height="{{ $thumb.Height }}">
        </a>
      {{ end }}
    {{ end }}
  </div>
