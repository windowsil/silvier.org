<style>
    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
      gap: 16px;
    }
    .item-grid img {
      width: 100%;
      max-width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }
  </style>
  
  <div class="item-grid">
    {{ $images := .Page.Resources.Match "img/*" }}
    {{ range $images }}
      {{ $oriented := .Filter (images.AutoOrient) }}
      {{ $resized := $oriented.Fit "1200x1200 webp q85" }}
      <img src="{{ $resized.RelPermalink }}" alt="{{ .Name }}" loading="lazy" width="{{ $resized.Width }}" height="{{ $resized.Height }}">
    {{ end }}
  </div>
